apiVersion: apps/v1
kind: Deployment
metadata:
  name: conference-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: conference-web
  template:
    metadata:
      labels:
        app: conference-web
    spec:
      containers:
      - name: conf-container
        image: conference-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001
